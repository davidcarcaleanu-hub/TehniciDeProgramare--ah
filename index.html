<!doctype html>
<html>

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chess - Project</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <header class="top-header">
    <img src="Sah2.jpeg" alt="chess header">
  </header>

  <div class="game-wrapper">
    <input id="playerBlack" placeholder="Nume Jucător Negru" />
    <div id="canvas-holder"></div>
    <input id="playerWhite" placeholder="Nume Jucător Alb" />
  </div>

  <script src="https://cdn.jsdelivr.net/npm/p5@1.11.11/lib/p5.min.js"></script>
  <script>
    //matricea pentru piese
    //piesele albe sunt notate cu a_piesa
    //piesele negre sunt notate cu n_piesa
    const Button = {
      x: 0,
      y: 0,
      width: 0,
      height: 0,
      color: "white",
      text: "null",
      textColor: "black",
      textPadding: 20,
      init: function (x, y, width, height, color, text) {
        this.x = x;
        this.y = y;
        this.width = width;
        this.height = height;
        this.color = color;
        this.text = text;
      },
      draw: function () {
        fill(this.color);
        rect(this.x, this.y, this.width, this.height);

        fill(this.textColor);
        text(this.text, this.x + this.textPadding, this.y + this.textPadding);
      },

      checkIfClicked: function (callback) {    //dimensiunile butonului
        if (
          (mouseX >= this.x && mouseX <= this.x + this.width) &&
          (mouseY >= this.y && mouseY <= this.y + this.height)
        ) {
          callback();
        }
      }

    }
    const restartButton = Object.create(Button);
    restartButton.init(305, 660, 100, 30, "white", "RESTART")

    const Piece = {
      row: 0,
      column: 0,
      type: null,
      color: null,

      init: function (row, column, type, color) {
        this.row = row;
        this.column = column;
        this.type = type;
        this.color = color;
      },
      draw: function () {
        let square = squareSize;
        let ChessPiece = this.color + "_" + this.type;
        image(
          img[ChessPiece],
          offsetX + this.column * square,
          offsetY + this.row * square,
          square,
          square,
        );
      },

      checkIfClicked: function (callback) {
        if (
          (mouseX >= this.x &&
            mouseX <= this.x + this.width) &&
          (mouseY >= this.y &&
            mouseY <= this.y + this.height)
        ) {
          callback();
        }
      }
    }


    let img = {};
    let pieces = [];
    let selectedPiece = null;
    let boardSize = 600;
    let squareSize = boardSize / 8
    let offsetX;
    let offsetY;
    let blackName = "";
    let whiteName = "";
    function preload() {
      img["n_pion"] = loadImage("black/n_pion.png");
      img["n_tura"] = loadImage("black/n_tura.png");
      img["n_cal"] = loadImage("black/n_cal.png");
      img["n_nebun"] = loadImage("black/n_nebun.png");
      img["n_rege"] = loadImage("black/n_rege.png");
      img["n_regina"] = loadImage("black/n_regina.png");
      img["a_pion"] = loadImage("white/a_pion.png");
      img["a_tura"] = loadImage("white/a_tura.png");
      img["a_cal"] = loadImage("white/a_cal.png");
      img["a_nebun"] = loadImage("white/a_nebun.png");
      img["a_rege"] = loadImage("white/a_rege.png");
      img["a_regina"] = loadImage("white/a_regina.png");
    }

    function initPieces() {
      pieces = [];
      let back_row = [
        "tura",
        "cal",
        "nebun",
        "regina",
        "rege",
        "nebun",
        "cal",
        "tura",
      ];

      for (let col = 0; col < 8; col++) {
        // => pentru piesele negre
        let p = Object.create(Piece);
        p.init(0, col, back_row[col], "n"); //n se refera la negru
        pieces.push(p);

        let p2 = Object.create(Piece);
        p2.init(1, col, "pion", "n");
        pieces.push(p2);
      }

      for (let col = 0; col < 8; col++) {
        // => pentru piesele albe
        let p = Object.create(Piece);
        p.init(6, col, "pion", "a"); // a se referea la alb
        pieces.push(p);

        let p2 = Object.create(Piece);
        p2.init(7, col, back_row[col], "a");
        pieces.push(p2);
      }
    }

    function setup() {
      let canvas = createCanvas(700, 700);
      canvas.parent("canvas-holder");
      noStroke();
      background(0);
      initPieces();

    }

    function draw() { //desenarea tablei 


      background(0);
      offsetX = (width - boardSize) / 2;
      offsetY = (height - boardSize) / 2;
      blackName = document.getElementById("playerBlack").value;
      whiteName = document.getElementById("playerWhite").value;
      restartButton.draw();

      for (let i = 0; i < 8; i++) {
        //bucla orizontala
        for (let j = 0; j < 8; j++) {
          // bucla verticala
          if ((i + j) % 2 == 0) {
            fill(255); //alb
          } else {
            fill(100); //negru
          }
          rect(
            offsetX + i * squareSize,
            offsetY + j * squareSize,
            squareSize,
            squareSize
          );
        }
      }


      if (selectedPiece) { //coloreaza fundalul casutei cu galben in momentul in care selectam o piesa
        let square = squareSize;
        fill(255, 255, 0, 150);
        rect(
          offsetX + selectedPiece.column * square,
          offsetY + selectedPiece.row * square,
          square,
          square,
        );
      }

      for (let i = 0; i < pieces.length; i++) {
        pieces[i].draw();
      }

    }



    function mousePressed() { // pentru a muta piesele
      let square = squareSize;
      if (
        mouseX < offsetX || mouseX > offsetX + boardSize ||
        mouseY < offsetY || mouseY > offsetY + boardSize
      ) {
        return;
      }
      let clickedColumn = Math.floor((mouseX - offsetX) / squareSize);
      let clickedRow = Math.floor((mouseY - offsetY) / squareSize);

      restartButton.checkIfClicked(() => {   //cand se apasa butonul Restart, se revine la forma initiala

        selectedPiece = null;
        pieces = []
        initPieces();

        const black = document.getElementById("playerBlack")
        const white = document.getElementById("playerWhite")

        black.value = "";
        white.value = "";
        black.disabled = false;
        white.disabled = false;

        blackName = "";
        whiteName = "";
        console.log("Hello")

      });


      let clickedPiece = null;
      // for (let i = 0; i < pieces.length; i++) { //ia fiecare piesa si spune daca a fost selectata
      //   if (pieces[i].checkIfCliked(mouseX, mouseY)) {
      //     clickedPiece = pieces[i]; //piesa este salvata in aici
      //     break;
      //   }
      // }
      for (let i = 0; i < pieces.length; i++) {
        if (
          pieces[i].row === clickedRow &&
          pieces[i].column === clickedColumn
        ) {
          clickedPiece = pieces[i]
          break;
        }
      }


      if (clickedPiece) {
        if (clickedPiece === selectedPiece) { //selectarea si deselectarea unei piese
          selectedPiece = null;
        } else if ( //mutarea unei piese si capturarea pieselor de culoare opusa
          selectedPiece &&
          selectedPiece.color !== clickedPiece.color
        ) {
          selectedPiece.column = clickedColumn;
          selectedPiece.row = clickedRow;
          pieces.splice(pieces.indexOf(clickedPiece), 1);
          selectedPiece = null;
        } else {
          selectedPiece = clickedPiece;
        }
      } else { //mutarea pe o casuta libera
        if (selectedPiece) {
          selectedPiece.column = clickedColumn;
          selectedPiece.row = clickedRow;
          selectedPiece = null;
        }
      }
    }
    function lockInputOnEnter(id) {
      document.getElementById(id).addEventListener("keydown", function (e) {
        if (e.key === "Enter") {
          this.disabled = true;
        }
      });
    }
    lockInputOnEnter("playerBlack")
    lockInputOnEnter("playerWhite")


  </script>

</body>

</html>
