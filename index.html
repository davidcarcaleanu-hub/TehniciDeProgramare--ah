<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess - Project</title>
    <link rel="stylesheet" href="style.css">

</head>

<body>
    <script src="https://cdn.jsdelivr.net/npm/p5@1.11.11/lib/p5.min.js"></script>
    <script>
        //matricea pentru piese
        //piesele albe sunt notate cu a_piesa
        //piesele negre sunt notate cu n_piesa
        let matricePiese = [
            ['n_tura', 'n_cal', 'n_nebun', 'n_regina', 'n_rege', 'n_nebun', 'n_cal', 'n_tura' ],
            ['n_pion', 'n_pion', 'n_pion', 'n_pion', 'n_pion', 'n_pion', 'n_pion', 'n_pion' ],
            [null,      null,     null,     null,     null,     null,     null,     null ],
            [null,      null,     null,     null,     null,     null,     null,     null ],
            [null,      null,     null,     null,     null,     null,     null,     null ],
            [null,      null,     null,     null,     null,     null,     null,     null ],
            ['a_pion', 'a_pion', 'a_pion', 'a_pion', 'a_pion', 'a_pion', 'a_pion', 'a_pion' ],
            ['a_tura', 'a_cal', 'a_nebun', 'a_regina', 'a_rege', 'a_nebun', 'a_cal', 'a_tura' ]
            
        ]
        let img = {};
        function preload() {
            img['n_pion'] = loadImage('black/n_pion.png')
            img['n_tura'] = loadImage('black/n_tura.png')
            img['n_cal'] = loadImage('black/n_cal.png')
            img['n_nebun'] = loadImage('black/n_nebun.png')
            img['n_rege'] = loadImage('black/n_rege.png')
            img['n_regina'] = loadImage('black/n_regina.png')
            img['a_pion'] = loadImage('white/a_pion.png')
            img['a_tura'] = loadImage('white/a_tura.png')
            img['a_cal'] = loadImage('white/a_cal.png')
            img['a_nebun'] = loadImage('white/a_nebun.png')
            img['a_rege'] = loadImage('white/a_rege.png')
            img['a_regina'] = loadImage('white/a_regina.png')
        }
        function setup() {
            let canvas = createCanvas(600, 570);
            noStroke();
            background(0)
            canvas.style('border', '5px solid black');
        }

        function draw() {
            //variabila d este pentru deplasarea verticală, în timp ce i și j sunt pentru desenarea modelului
            for (let i = 0, d = 1; i < 8; i++) {   //bucla orizontala
                for (let j = 0; j < 8; j++) {   // bucla verticala
                    if (j % 2 != 0) {
                        fill(255)
                        rect(i * (width / 8), j * (height / 8) - d * (height / 8), width / 8, height / 8);
                    }
                }
                if (i % 2 != 0) {
                    d = 1
                } else {
                    d = 0
                }
            }
            //desenarea pieselor pe tabla de sah
            matricePiese.forEach((row, rowIndex) => {
                row.forEach((piece, colIndex) => {
                    if (piece !== null) {
                        image(img[piece], colIndex * (width / 8), rowIndex * (height / 8), width / 8, height / 8)
                    }
                })
            });

        }

    </script>
</body>

</html>
